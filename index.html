<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>段考出缺席回報系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, '微軟正黑體', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useRef, useEffect } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyBJr9E7Rz2vduTDy8qiswq8dqCpZjLqkJw",
      authDomain: "ynhs-test.firebaseapp.com",
      projectId: "ynhs-test",
      storageBucket: "ynhs-test.firebasestorage.app",
      messagingSenderId: "356400350765",
      appId: "1:356400350765:web:fc97569fbf2cbaf53a9aa4",
      measurementId: "G-YTZJRLQ90H"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const Icon = ({ name, className = '', size = 16 }) => {
      const fontSize = typeof size === 'number' ? `${size}px` : size;
      return <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize }}></i>;
    };
    const ClipboardList = (props) => <Icon name="clipboard-list" {...props} />;
    const Users = (props) => <Icon name="users" {...props} />;
    const CheckCircle = (props) => <Icon name="circle-check" {...props} />;
    const AlertTriangle = (props) => <Icon name="triangle-exclamation" {...props} />;
    const Clock = (props) => <Icon name="clock" {...props} />;
    const Send = (props) => <Icon name="paper-plane" {...props} />;
    const XCircle = (props) => <Icon name="circle-xmark" {...props} />;
    const Camera = (props) => <Icon name="camera" {...props} />;
    const Plus = (props) => <Icon name="plus" {...props} />;
    const Trash2 = (props) => <Icon name="trash-can" {...props} />;
    const Settings = (props) => <Icon name="gear" {...props} />;
    const LinkIcon = (props) => <Icon name="link" {...props} />;
    const Copy = (props) => <Icon name="copy" {...props} />;
    const Eye = (props) => <Icon name="eye" {...props} />;
    const CalendarClock = (props) => <Icon name="calendar-day" {...props} />;
    const MessageSquare = (props) => <Icon name="comment-dots" {...props} />;
    const FileText = (props) => <Icon name="file-lines" {...props} />;
    const Info = (props) => <Icon name="circle-info" {...props} />;
    const X = (props) => <Icon name="xmark" {...props} />;

    const generateClasses = () => {
      const hsGrades = ['三', '二', '一'];
      const hsNames = ['忠', '孝', '仁'];
      const jhGrades = ['三', '二', '一'];
      const jhNames = ['忠', '孝', '仁', '愛', '信', '義', '和', '平'];
      const classes = [];
      hsGrades.forEach(g => { hsNames.forEach((n, idx) => { classes.push({ id: `H${g}-${idx}`, group: `高${g}`, name: `高${g}${n}`, status: 'pending', detail: '', absentData: [], makeupData: [], isActive: true }); }); });
      jhGrades.forEach(g => { jhNames.forEach((n, idx) => { classes.push({ id: `J${g}-${idx}`, group: `國${g}`, name: `國${g}${n}`, status: 'pending', detail: '', absentData: [], makeupData: [], isActive: true }); }); });
      return classes;
    };

    const App = () => {
      const [isTeacherMode, setIsTeacherMode] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const boardRef = useRef(null); 
      
      const [isReady, setIsReady] = useState(false);
      const [user, setUser] = useState(null);
      const [notification, setNotification] = useState('');
      
      const [isExporting, setIsExporting] = useState(false);
      const [exportSection, setExportSection] = useState('all'); 
      const [exportTimeStr, setExportTimeStr] = useState(''); 
      const [previewImage, setPreviewImage] = useState(null); 
      
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const [records, setRecords] = useState(generateClasses());
      const [examConfig, setExamConfig] = useState({ title: '114-2 第1次定期評量', subtitle: '第一天' });
      const [collectPaperGrades, setCollectPaperGrades] = useState({ '高三': false, '高二': false, '高一': false, '國三': false, '國二': false, '國一': false });
      const [generatedLink, setGeneratedLink] = useState('');

      const [selectedClass, setSelectedClass] = useState('H3-0'); 
      const [attendanceMode, setAttendanceMode] = useState('all_present'); 
      const [absentList, setAbsentList] = useState([{ seatNumber: '', name: '', leaveType: '事假' }]);
      const [hasMakeup, setHasMakeup] = useState(false);
      const [makeupList, setMakeupList] = useState([{ seatNumber: '', name: '' }]);

      useEffect(() => {
        const initAuth = async () => {
          try { await signInAnonymously(auth); } catch (e) {
            console.error("Firebase登入失敗", e);
            setNotification('連線失敗，請確認 Firebase 設定。');
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const docRef = doc(db, 'school_data', 'examState');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.records) setRecords(data.records);
            if (data.examConfig) setExamConfig(data.examConfig);
            if (data.collectPaperGrades) setCollectPaperGrades(data.collectPaperGrades);
            setIsReady(true);
          } else {
            setDoc(docRef, {
              records: generateClasses(),
              examConfig: { title: '114-2 第1次定期評量', subtitle: '第一天' },
              collectPaperGrades: { '高三': false, '高二': false, '高一': false, '國三': false, '國二': false, '國一': false }
            });
            setIsReady(true);
          }
        }, (error) => {
          console.error("同步錯誤", error);
          setNotification('資料庫連線錯誤，請確認 Firebase 是否設為「測試模式」');
        });
        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('id')) { setIsTeacherMode(true); setActiveTab('report'); }
      }, []);

      const syncToCloud = (field, data) => {
        if (db && user) { setDoc(doc(db, 'school_data', 'examState'), { [field]: data }, { merge: true }); }
      };

      useEffect(() => {
        const currentRecord = records.find(r => r.id === selectedClass);
        if (currentRecord && currentRecord.status !== 'pending') {
          setAttendanceMode(currentRecord.status);
          if (currentRecord.status === 'absent' && currentRecord.absentData?.length > 0) {
            setAbsentList(currentRecord.absentData);
          } else { setAbsentList([{ seatNumber: '', name: '', leaveType: '事假' }]); }
          
          if (currentRecord.makeupData && currentRecord.makeupData.length > 0) {
            setHasMakeup(true);
            setMakeupList(currentRecord.makeupData);
          } else {
            setHasMakeup(false);
            setMakeupList([{ seatNumber: '', name: '' }]);
          }
        } else {
          setAttendanceMode('all_present'); 
          setAbsentList([{ seatNumber: '', name: '', leaveType: '事假' }]);
          setHasMakeup(false);
          setMakeupList([{ seatNumber: '', name: '' }]);
        }
      }, [selectedClass, records]);

      const handleAbsentChange = (index, field, value) => {
        const newList = [...absentList]; newList[index][field] = value; setAbsentList(newList);
      };
      const addAbsentRow = () => setAbsentList([...absentList, { seatNumber: '', name: '', leaveType: '事假' }]);
      const removeAbsentRow = (index) => setAbsentList(absentList.filter((_, i) => i !== index));

      const handleMakeupChange = (index, field, value) => {
        const newList = [...makeupList]; newList[index][field] = value; setMakeupList(newList);
      };
      const addMakeupRow = () => setMakeupList([...makeupList, { seatNumber: '', name: '' }]);
      const removeMakeupRow = (index) => setMakeupList(makeupList.filter((_, i) => i !== index));

      const handleSubmit = (e) => {
        e.preventDefault();
        const now = new Date();
        const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        let validAbsents = [];
        if (attendanceMode === 'absent') validAbsents = absentList.filter(item => item.seatNumber.toString().trim() !== '');

        let validMakeups = [];
        if (attendanceMode === 'all_present' && hasMakeup) {
          validMakeups = makeupList.filter(item => item.seatNumber.toString().trim() !== '');
        }

        const newRecords = records.map(record => {
          if (record.id === selectedClass) { 
            return { 
              ...record, 
              status: attendanceMode, 
              absentData: validAbsents, 
              makeupData: validMakeups,
              time: timeString 
            };
          }
          return record;
        });

        setRecords(newRecords);
        syncToCloud('records', newRecords);
        
        const className = records.find(r => r.id === selectedClass)?.name;
        const isUpdate = records.find(r => r.id === selectedClass)?.status !== 'pending';
        setNotification(isUpdate ? `${className} 資料已更新！` : `${className} 回報成功！`);
        
        setTimeout(() => { setNotification(''); if (!isTeacherMode) setActiveTab('dashboard'); }, 1500);
      };

      const toggleCollectPaperGrade = (grade) => {
        const newGrades = {...collectPaperGrades, [grade]: !collectPaperGrades[grade]};
        setCollectPaperGrades(newGrades); syncToCloud('collectPaperGrades', newGrades);
      };

      const toggleClassActive = (id) => {
        const newRecords = records.map(r => r.id === id ? { ...r, isActive: !r.isActive } : r);
        setRecords(newRecords); syncToCloud('records', newRecords);
      };

      const handleExportImage = (section) => {
        if (!window.html2canvas) return;
        setIsExporting(true); 
        setExportSection(section);
        
        const sectionName = section === 'high' ? '高中部' : section === 'junior' ? '國中部' : '全校';
        setNotification(`正在產生【${sectionName}】圖片中...`);
        
        const now = new Date();
        setExportTimeStr(`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`);
        
        setTimeout(() => {
          if (boardRef.current) {
            window.html2canvas(boardRef.current, { scale: 2, backgroundColor: '#f9fafb', useCORS: true, logging: false }).then(canvas => {
              setPreviewImage(canvas.toDataURL('image/png')); 
              setIsExporting(false); 
              setExportSection('all'); 
              setNotification('');
            }).catch(err => { 
              setIsExporting(false); 
              setExportSection('all');
              setNotification('❌ 圖片產生失敗'); 
            });
          }
        }, 800); 
      };

      const confirmReset = () => {
        const resetRecords = records.map(r => ({
          ...r,
          status: 'pending',
          absentData: [],
          makeupData: [],
          time: '',
          detail: ''
        }));
        setRecords(resetRecords);
        syncToCloud('records', resetRecords);

        const resetGrades = { '高三': false, '高二': false, '高一': false, '國三': false, '國二': false, '國一': false };
        setCollectPaperGrades(resetGrades);
        syncToCloud('collectPaperGrades', resetGrades);

        setShowResetConfirm(false);
        setNotification('✅ 所有資料已成功歸零，準備好迎接新的一天！');
        setTimeout(() => setNotification(''), 3000);
      };

      if (!isReady) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50">
            <i className="fa-solid fa-circle-notch fa-spin text-teal-600 text-4xl mb-4"></i>
            <div className="text-teal-700 font-bold text-xl">連線至雲端資料庫...</div>
          </div>
        );
      }

      const activeRecords = records.filter(r => r.isActive);
      const visibleRecords = activeRecords.filter(r => {
        if (exportSection === 'high') return r.group.includes('高');
        if (exportSection === 'junior') return r.group.includes('國');
        return true;
      });

      const summary = {
        total: visibleRecords.length, 
        reported: visibleRecords.filter(r => r.status !== 'pending').length,
        allPresent: visibleRecords.filter(r => r.status === 'all_present').length, 
        hasAbsent: visibleRecords.filter(r => r.status === 'absent').length,
        pending: visibleRecords.filter(r => r.status === 'pending').length,
      };

      const groupedVisibleRecords = visibleRecords.reduce((acc, curr) => { 
        if (!acc[curr.group]) acc[curr.group] = []; 
        acc[curr.group].push(curr); 
        return acc; 
      }, {});

      const groupedAllRecords = records.reduce((acc, curr) => { 
        if (!acc[curr.group]) acc[curr.group] = []; 
        acc[curr.group].push(curr); 
        return acc; 
      }, {});

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 pb-10">
          <nav className="bg-teal-700 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <div className="max-w-4xl mx-auto w-full flex justify-between items-center">
              <div className="flex items-center space-x-3">
                <ClipboardList size={24} />
                <div>
                  <h1 className="text-lg md:text-xl font-bold flex items-center">
                    {examConfig.title} 
                    <span className="ml-2 flex items-center text-xs bg-teal-800 px-2 py-0.5 rounded-full text-teal-200"><span className="w-2 h-2 bg-green-400 rounded-full mr-1 animate-pulse"></span>連線正常</span>
                  </h1>
                  <p className="text-xs md:text-sm text-teal-200">{examConfig.subtitle} 回報系統</p>
                </div>
              </div>
            </div>
          </nav>

          <div className="max-w-4xl mx-auto mt-4 px-4 relative">
            {!isTeacherMode && (
              <div className="flex space-x-1 md:space-x-2 mb-6 bg-white p-1 rounded-lg shadow-sm border border-gray-200">
                <button onClick={() => setActiveTab('dashboard')} className={`flex-1 py-3 px-2 md:px-4 rounded-md flex items-center justify-center space-x-1 md:space-x-2 transition-colors text-sm md:text-base ${activeTab === 'dashboard' ? 'bg-teal-50 text-teal-700 font-bold border border-teal-200' : 'text-gray-500 hover:bg-gray-50'}`}>
                  <Users size={18} /><span className="whitespace-nowrap">全校看板</span>
                </button>
                <button onClick={() => setActiveTab('report')} className={`flex-1 py-3 px-2 md:px-4 rounded-md flex items-center justify-center space-x-1 md:space-x-2 transition-colors text-sm md:text-base ${activeTab === 'report' ? 'bg-teal-50 text-teal-700 font-bold border border-teal-200' : 'text-gray-500 hover:bg-gray-50'}`}>
                  <Send size={18} /><span className="whitespace-nowrap">導師回報</span>
                </button>
                <button onClick={() => setActiveTab('settings')} className={`flex-1 py-3 px-2 md:px-4 rounded-md flex items-center justify-center space-x-1 md:space-x-2 transition-colors text-sm md:text-base ${activeTab === 'settings' ? 'bg-teal-50 text-teal-700 font-bold border border-teal-200' : 'text-gray-500 hover:bg-gray-50'}`}>
                  <Settings size={18} /><span className="whitespace-nowrap">行政設定</span>
                </button>
              </div>
            )}

            {notification && (
              <div className={`border-l-4 p-4 mb-4 rounded shadow-sm flex items-center font-bold ${notification.includes('失敗') || notification.includes('錯誤') ? 'bg-red-100 border-red-500 text-red-800' : 'bg-green-100 border-green-500 text-green-800'}`}>
                {notification.includes('產生圖片') ? <Camera className="mr-2" size={20} /> : <CheckCircle className="mr-2" size={20} />}
                {notification}
              </div>
            )}

            {showResetConfirm && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-70 p-4">
                <div className="bg-white rounded-xl w-full max-w-md flex flex-col shadow-2xl overflow-hidden z-[60]">
                  <div className="p-4 border-b border-gray-200 bg-red-50">
                    <h3 className="font-bold text-red-800 text-lg flex items-center">
                      <AlertTriangle className="mr-2" size={20} /> 警告：清除所有資料
                    </h3>
                  </div>
                  <div className="p-6 text-gray-700">
                    <p className="font-bold text-lg mb-2">確定要清除所有的出缺席資料嗎？</p>
                    <p className="text-sm text-gray-500 leading-relaxed">
                      這將會把全校所有班級恢復為「尚未回報」的狀態，並清空所有的缺考名單。<br/><br/>
                      ※ 您的班級勾選設定與考試名稱<span className="text-green-600 font-bold">會自動保留</span>。<br/>
                      <span className="text-red-600 font-bold">此動作無法復原！</span>
                    </p>
                  </div>
                  <div className="p-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3">
                    <button onClick={() => setShowResetConfirm(false)} className="px-5 py-2 rounded-lg font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors">
                      取消
                    </button>
                    <button onClick={confirmReset} className="px-5 py-2 rounded-lg font-bold text-white bg-red-600 hover:bg-red-700 transition-colors shadow-sm flex items-center">
                      <Trash2 className="mr-2" size={16}/> 確定清除
                    </button>
                  </div>
                </div>
              </div>
            )}

            {previewImage && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80 p-4">
                <div className="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] flex flex-col relative shadow-2xl">
                  <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-xl">
                    <h3 className="font-bold text-gray-800 text-lg flex items-center"><Camera className="mr-2 text-teal-600" size={20}/> 圖片產生完成</h3>
                    <button onClick={() => setPreviewImage(null)} className="text-gray-400 hover:text-red-500 transition-colors p-1 bg-white rounded-full shadow-sm"><X size={24} /></button>
                  </div>
                  <div className="p-4 bg-orange-50 border-b border-orange-100 text-center">
                    <p className="text-sm font-bold text-orange-800 flex justify-center items-center">
                      <span className="mr-1">👇</span> 手機版請對著下方圖片【長按】，選擇儲存或分享 <span className="ml-1">👇</span>
                    </p>
                  </div>
                  <div className="overflow-y-auto flex-1 p-4 bg-gray-200 flex justify-center items-start">
                    <img src={previewImage} alt="出缺席總表預覽" className="max-w-full h-auto shadow-md border border-gray-300" />
                  </div>
                  <div className="p-4 border-t border-gray-200 bg-white rounded-b-xl flex justify-center gap-4">
                    <button onClick={() => {
                        const link = document.createElement('a'); link.href = previewImage;
                        const now = new Date(); const timeStr = `${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
                        link.download = `出缺席總表_${timeStr}.png`; link.click();
                      }} className="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-lg font-bold transition-colors flex items-center shadow-md">
                      💻 電腦版下載圖片
                    </button>
                    <button onClick={() => setPreviewImage(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-lg font-bold transition-colors">
                      關閉
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ======= 導師回報區 ======= */}
            {activeTab === 'report' && (
               <div className="bg-white rounded-xl shadow-md p-6 max-w-md mx-auto border-t-4 border-teal-600">
               <div className="mb-4">
                 <h2 className="text-xl font-bold text-gray-800 flex items-center"><Send className="mr-2" size={20}/> 出缺席回報</h2>
                 <p className="text-gray-500 text-sm mt-1">如需修改紀錄，重新選擇班級並送出即可覆蓋前次資料。</p>
               </div>

               <form onSubmit={handleSubmit} className="space-y-6">
                 <div>
                   <label className="block text-sm font-bold text-gray-700 mb-2">1. 您的班級</label>
                   <select value={selectedClass} onChange={(e) => setSelectedClass(e.target.value)} className="w-full border-2 border-gray-300 rounded-lg p-3 bg-white focus:ring-0 focus:border-teal-500 outline-none text-lg font-medium">
                     {Object.entries(groupedAllRecords).map(([groupName, classes]) => {
                       const activeInGroup = classes.filter(c => c.isActive);
                       if (activeInGroup.length === 0) return null;
                       return (
                         <optgroup key={groupName} label={`${groupName}年級`}>
                           {activeInGroup.map(c => (
                             <option key={c.id} value={c.id}>{c.name} {c.status !== 'pending' ? '(已填報)' : ''}</option>
                           ))}
                         </optgroup>
                       );
                     })}
                   </select>
                 </div>

                 <div>
                   <label className="block text-sm font-bold text-gray-700 mb-2">2. 今日出席狀況</label>
                   <div className="grid grid-cols-2 gap-3">
                     <button type="button" onClick={() => setAttendanceMode('all_present')} className={`p-4 rounded-lg border-2 flex flex-col items-center justify-center transition-all ${attendanceMode === 'all_present' ? 'border-green-500 bg-green-50 text-green-700 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:bg-gray-50'}`}>
                       <CheckCircle size={32} className={`mb-2 ${attendanceMode === 'all_present' ? 'text-green-500' : 'text-gray-400'}`} />
                       <span className="font-bold">全班實到</span>
                     </button>
                     <button type="button" onClick={() => setAttendanceMode('absent')} className={`p-4 rounded-lg border-2 flex flex-col items-center justify-center transition-all ${attendanceMode === 'absent' ? 'border-red-500 bg-red-50 text-red-700 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:bg-gray-50'}`}>
                       <AlertTriangle size={32} className={`mb-2 ${attendanceMode === 'absent' ? 'text-red-500' : 'text-gray-400'}`} />
                       <span className="font-bold">有人請假/缺考</span>
                     </button>
                   </div>
                 </div>

                              } catch (err) { setNotification('❌ 複製失敗，請手動選取複製。'); }
                              setTimeout(() => setNotification(''), 3000);
                            }} className="p-2.5 md:px-4 bg-teal-100 text-teal-800 hover:bg-teal-200 font-bold flex items-center transition-colors text-sm md:text-base border-l border-teal-300">
                            <Copy size={18} className="mr-1"/> 複製
                          </button>
                        </div>

                        <div className="p-4 bg-white border border-teal-200 rounded-lg shadow-sm mt-3">
                          <div className="flex justify-between items-center mb-2">
                            <p className="text-sm font-bold text-teal-800 flex items-center"><MessageSquare size={16} className="mr-1.5" /> 💡 建議發布至群組的文案：</p>
                            <button onClick={() => {
                                const textToCopy = `各位導師好，\n今日為【${examConfig.title}${examConfig.subtitle ? ` - ${examConfig.subtitle}` : ''}】\n請於 8:15 前點擊下方專屬網址回報完畢（免登入即可快速填寫）：\n${generatedLink}\n\n※ 若有個別異動同學請直接與教學組連絡。`;
                                try {
                                  const textArea = document.createElement("textarea");
                                  textArea.value = textToCopy; textArea.style.position = "fixed"; textArea.style.left = "-9999px"; textArea.style.top = "-9999px";
                                  document.body.appendChild(textArea); textArea.focus(); textArea.select();
                                  document.execCommand('copy'); document.body.removeChild(textArea);
                                  setNotification('✅ 群組文案已成功複製到剪貼簿！');
                                } catch (err) { setNotification('❌ 複製失敗，請手動選取複製。'); }
                                setTimeout(() => setNotification(''), 3000);
                              }} className="px-3 py-1.5 bg-teal-600 text-white hover:bg-teal-700 rounded-md text-sm font-bold transition-colors flex items-center shadow-sm">
                              <Copy size={14} className="mr-1"/> 一鍵複製完整文案
                            </button>
                          </div>
                          <textarea readOnly className="w-full text-sm text-gray-700 bg-gray-50 p-3 rounded-lg outline-none border border-gray-200 resize-none leading-relaxed" rows="5" value={`各位導師好，\n今日為【${examConfig.title}${examConfig.subtitle ? ` - ${examConfig.subtitle}` : ''}】\n請於 8:15 前點擊下方專屬網址回報完畢（免登入即可快速填寫）：\n${generatedLink}\n\n※ 若有個別異動同學請直接與教學組連絡。`} />
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="bg-red-50 p-4 rounded-lg border border-red-200 mt-6">
                    <h3 className="font-bold text-red-800 text-sm border-b border-red-200 pb-2 mb-4 flex items-center">
                      <AlertTriangle size={16} className="mr-1"/> 4. 換日 / 下一節考試專用 (危險操作)
                    </h3>
                    <button 
                      onClick={() => setShowResetConfirm(true)}
                      className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-5 rounded-lg transition-colors flex items-center justify-center shadow-md"
                    >
                      <Trash2 className="mr-2" size={18} /> 一鍵清除今日所有回報紀錄
                    </button>
                    <p className="text-xs text-red-600 mt-3 font-medium leading-relaxed">
                      ※ 進行第二天或下一堂考試前，請點擊此按鈕將全校狀態恢復為「尚未回報」，方便導師重新填寫。<br/>
                      (您的班級勾選設定與考試名稱會保留，只有出席資料會被清空)
                    </p>
                  </div>

                </div>
              </div>
            )}
          </div>
        </div>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
